# Page Speed Report – run script via workflow, send CSV by Gmail
#
# HOW TO RUN: Actions tab → "Page Speed Report" → Run workflow → Choose branch → Run workflow
#
# GMAIL SETUP (Settings → Secrets and variables → Actions → Secrets):
#   SMTP_USER     = your Gmail address (e.g. you@gmail.com)
#   SMTP_PASSWORD = Gmail App Password (16-char, NOT your normal password)
#   EMAIL_TO      = deepak.maheshwari@exinent.com
#   IMGBB_API_KEY = your ImgBB API key
#
# Create App Password: Google Account → Security → 2-Step Verification → App passwords
# https://support.google.com/accounts/answer/185833

name: Page Speed Report

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC

  push:
    branches:
      - main
      - master

env:
  PAGESPEED_CSV_PATH: pagespeed_results.csv
  CI: true
  JAVA_VERSION: '21'

jobs:

  pagespeed:
    name: Run PageSpeed & Send Report
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # 3. Chrome (Selenium 4.x auto-downloads matching ChromeDriver)
      - name: Set up Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 4. Confirm Chrome on PATH
      - name: Verify Chrome installation
        run: |
          google-chrome --version || chromium-browser --version || echo "Chrome not found"
          which google-chrome || which chromium-browser || true

      # 5. Build & Run
      - name: Build and Run PageSpeed script
        id: run
        run: mvn -B compile exec:java -Dexec.mainClass="Speed.sitepeed"
        env:
          PAGESPEED_CSV_PATH: ${{ env.PAGESPEED_CSV_PATH }}
          CI: ${{ env.CI }}
          GITHUB_ACTIONS: "true"
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      # 6. Hint on failure
      - name: Show failure hint
        if: failure()
        run: |
          echo "::error::PageSpeed script failed."
          echo "Common causes: Chrome path, pagespeed.web.dev selector changed, timeout."

      # 7. Check CSV (always runs, even if script failed)
      - name: Check CSV exists
        id: csv
        if: always()
        run: |
          if [ -f "${{ env.PAGESPEED_CSV_PATH }}" ]; then
            echo "exists=true"  >> $GITHUB_OUTPUT
            echo "lines=$(wc -l < "${{ env.PAGESPEED_CSV_PATH }}")" >> $GITHUB_OUTPUT
            echo "CSV found:"
            cat "${{ env.PAGESPEED_CSV_PATH }}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::CSV file was not created."
          fi

      # 8. Upload artifact
      - name: Upload CSV artifact
        if: always() && steps.csv.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-results-${{ github.run_number }}
          path: ${{ env.PAGESPEED_CSV_PATH }}
          retention-days: 30

      # 9. Send email
      # ✅ FIX 1: Using separate server fields — connection_url caused SSL error
      # ✅ FIX 2: SMTP_USER & SMTP_PASSWORD secrets must be set in repo Settings
      - name: Send CSV via Gmail
        if: steps.csv.outputs.exists == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false            # false = STARTTLS on port 587 (correct for Gmail)
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PageSpeed Report #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          body: |
            Hi,

            The weekly PageSpeed automation has completed.

            • Run:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            • Sites checked:  10
            • CSV rows:       ${{ steps.csv.outputs.lines }}

            The CSV report is attached.

            — GitHub Actions
          attachments: ${{ env.PAGESPEED_CSV_PATH }}

      # 10. Job summary
      - name: Write job summary
        if: always()
        run: |
          echo "## 📊 Page Speed Report #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.csv.outputs.exists }}" = "true" ]; then
            echo "✅ CSV generated with **${{ steps.csv.outputs.lines }} lines**." >> $GITHUB_STEP_SUMMARY
            echo "📧 Email dispatched to EMAIL_TO." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No CSV produced — check script logs." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View full run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
