# Page Speed Report – run script via workflow, send CSV by Gmail
#
# HOW TO RUN: Actions tab → "Page Speed Report" → Run workflow → Choose branch → Run workflow
#
# GMAIL SETUP (Settings → Secrets and variables → Actions → Secrets):
#   SMTP_USER    = your Gmail address (e.g. you@gmail.com)
#   SMTP_PASSWORD = Gmail App Password (not your normal password)
#   EMAIL_TO     = email address to receive the CSV (can be same or different)
#
# Create App Password: Google Account → Security → 2-Step Verification → App passwords
# https://support.google.com/accounts/answer/185833

name: Page Speed Report

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/pagespeed.yml'
      - 'src/**'
      - 'pom.xml'

env:
  PAGESPEED_CSV_PATH: pagespeed_results.csv
  CI: true
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build
        run: mvn -B compile
        id: build
    outputs:
      built: ${{ steps.build.outcome == 'success' }}

  pagespeed:
    name: Run PageSpeed & send Gmail
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 50
    steps:
      - name: Start run
        run: echo "PageSpeed workflow running... (Build passed)"
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Run PageSpeed script
        id: run
        run: mvn -B compile exec:java -Dexec.mainClass="Speed.sitepeed"
        env:
          PAGESPEED_CSV_PATH: ${{ env.PAGESPEED_CSV_PATH }}
          CI: ${{ env.CI }}
      - name: Show failure hint
        if: failure()
        run: echo "::error::Step failed. Scroll up to the 'Run PageSpeed script' log for the error (e.g. element not found, timeout)."
      - name: Check CSV
        id: csv
        run: |
          if [ -f "${{ env.PAGESPEED_CSV_PATH }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "lines=$(wc -l < "${{ env.PAGESPEED_CSV_PATH }}")" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload artifact
        if: steps.csv.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-results-${{ github.run_number }}
          path: ${{ env.PAGESPEED_CSV_PATH }}
          retention-days: 30
      - name: Send CSV via Gmail
        if: success() && steps.csv.outputs.exists == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PageSpeed Report #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_TO }}
          # from is required; use SMTP_USER (your Gmail). Set repo secret SMTP_USER if you get "from" error.
          from: ${{ secrets.SMTP_USER || format('PageSpeed <{0}@users.noreply.github.com>', github.actor) }}
          body: |
            PageSpeed automation completed. CSV is attached.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ env.PAGESPEED_CSV_PATH }}
          secure: true
      - name: Summary
        run: |
          echo "## Page Speed Report" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.csv.outputs.exists }}" = "true" ]; then
            echo "✅ CSV generated (${{ steps.csv.outputs.lines }} lines). Sent via Gmail if EMAIL_TO is set." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No CSV produced" >> $GITHUB_STEP_SUMMARY
          fi
